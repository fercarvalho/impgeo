<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/imp_favicon.ico" />
    <link rel="apple-touch-icon" href="/imp_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="IMPGEO - Sistema de Gestão Inteligente" />
    <meta name="author" content="IMPGEO" />
    <title>IMPGEO - Sistema de Gestão Inteligente</title>
    <!--
      Bug fix #4 — FOUC prevention (Flash of Unstyled Content).
      This blocking script runs before any CSS is parsed and before the first paint,
      applying the `dark` class and `color-scheme` synchronously so users with a dark
      preference never see a flash of light mode. Must stay inline and in <head>.
    -->
    <script>
      (function () {
        try {
          var key = 'impgeo-theme-preference';
          var isDemoMode =
            location.hostname.includes('github.io') ||
            location.hostname.includes('demo');
          var storage = isDemoMode ? sessionStorage : localStorage;
          var saved = storage.getItem(key);
          var prefersDark =
            saved === 'dark' ||
            (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (prefersDark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
            document.documentElement.setAttribute('data-theme', 'dark');
          } else {
            document.documentElement.style.colorScheme = 'light';
            document.documentElement.setAttribute('data-theme', 'light');
          }
        } catch (_) { /* storage blocked — default to light */ }
      })();
    </script>
    <!--
      PWA bootstrap — inline pra rodar antes do main.tsx.
      Define __APP_ID__ por hostname e injeta <link rel="manifest"> + meta
      theme-color do app correto. Hardcoded por host pra zero dependências
      (precisa rodar antes do beforeinstallprompt do browser).
    -->
    <script>
      (function () {
        try {
          var h = location.hostname.toLowerCase();
          var app = 'impgeo';
          if (h === 'terracontrol.com.br' || h === 'terracontrol.local') app = 'tc-public';
          window.__APP_ID__ = app;
          var manifestLink = document.createElement('link');
          manifestLink.rel = 'manifest';
          manifestLink.href = '/manifests/' + app + '.webmanifest';
          document.head.appendChild(manifestLink);
          var themeColor = app === 'tc-public' ? '#48A326' : '#1d4ed8';
          var themeMeta = document.createElement('meta');
          themeMeta.name = 'theme-color';
          themeMeta.content = themeColor;
          document.head.appendChild(themeMeta);
          // Favicon por app: TerraControl usa a logo própria (gerada de
          // logo_terracontrol.png). impgeo mantém o /imp_favicon.ico estático.
          if (app === 'tc-public') {
            var fav = document.querySelector('link[rel="icon"]');
            if (!fav) { fav = document.createElement('link'); fav.rel = 'icon'; document.head.appendChild(fav); }
            fav.type = 'image/png';
            fav.href = '/icons/tc/favicon.png';
          }
        } catch (_) { /* sem PWA — segue como web normal */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Fix para __HMR_CONFIG_NAME__ não definido
      if (typeof window !== 'undefined' && !window.__HMR_CONFIG_NAME__) {
        window.__HMR_CONFIG_NAME__ = 'vite';
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
